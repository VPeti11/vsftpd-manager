server {
    listen 5661;

    location / {
        proxy_pass http://127.0.0.1:5663;
    }
    
    location /manage {
        proxy_pass http://127.0.0.1:5662;
    }

    location /create {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/.ftpadmin;
        proxy_pass http://127.0.0.1:5662;
    }

    location /upload {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/.ftpadmin;
        proxy_pass http://127.0.0.1:5662;
    }
}
